version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - auth-service
      - file-service

  auth-service:
    build: ./auth-service

    container_name: auth-service

    ports:
      - "5000:5000"
    
    environment:
      DB_HOST: secure-edge-gateway-db.cjc6o2gkqx30.ap-south-1.rds.amazonaws.com
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      
    # environment:
    #   DB_HOST: postgres
    #   DB_PORT: 5432
    #   DB_NAME: secureedge
    #   DB_USER: postgres
    #   DB_PASSWORD: password

    # depends_on:
    #   - postgres

  file-service:
    build: ./file-service

    container_name: file-service

    env_file:
    - ./file-service/.env.development

    ports:
      - "5001:5001"
    
  # postgres:
  #   image: postgres:16
  #   container_name: postgres

  #   environment:
  #     POSTGRES_DB: secureedge
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: password

  #   ports:
  #     - "5432:5432"

  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: file-service-redis

    ports:
      - "6378:6379"

