events {}

http {
    server {
        listen 80;
        server_name secure-edge-gateway-vn.duckdns.org
        
        return 301 https://$host$request_uri;
    }

    server {

        listen 443 ssl;
        server_name secure-edge-gateway-vn.duckdns.org

        ssl_certificate /etc/letsencrypt/live/secure-edge-gateway-vn.duckdns.org/fullchain.pem;
        ssl-certificate_key /etc/letsencrypt/live/secure-edge-gateway-vn.duckdns.org/privkey.pem;

        location /auth/ {

            proxy_pass http://auth-service:5000;

        }

        location /files/ {

            proxy_pass http://file-service:5001;

        }

    }

}